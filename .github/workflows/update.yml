name: Weekly Paper Update

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日午夜运行 (UTC)
  workflow_dispatch: # 允许手动在 GitHub 界面点击运行

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests feedparser deep-translator

      - name: Run update script
        run: python update_papers.py

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "冰川地震学周报更新通知"
          to: ${{ secrets.MAIL_TO }}
          from: "Cryoseismology Bot <${{ secrets.MAIL_USERNAME }}>"
          body: file://email_body.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/data.json
          git commit -m "Auto-update papers: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
