name: Weekly Paper Update

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日 08:00 (北京时间), 等价于 UTC 00:00
  workflow_dispatch: # 允许手动在 GitHub 界面点击运行
    inputs:
      full_citation_scan:
        description: '是否重建全部历史引用数据'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: weekly-paper-update
  cancel-in-progress: false

jobs:
  update-papers:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests feedparser deep-translator fpdf beautifulsoup4

      - name: Run update script
        run: python update_papers.py

      - name: Run citations update
        env:
          FULL_SCAN: ${{ github.event.inputs.full_citation_scan == 'true' && 'true' || 'false' }}
        run: python update_citations.py

      - name: Generate report
        run: python generate_report.py

      - name: Get date range for filename
        id: date_range
        run: |
          START_DATE=$(date -d '7 days ago' +'%Y%m%d')
          END_DATE=$(date +'%Y%m%d')
          echo "start_date=$START_DATE" >> $GITHUB_OUTPUT
          echo "end_date=$END_DATE" >> $GITHUB_OUTPUT
          echo "display_date=$(date -d '7 days ago' +'%Y年%m月%d日')-$(date +'%Y年%m月%d日')" >> $GITHUB_OUTPUT

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.date_range.outputs.display_date }}，论文周报更新，请查收。"
          to: ${{ secrets.MAIL_TO }}
          from: "Seismology Bot"
          body: "${{ steps.date_range.outputs.display_date }}，论文周报更新，请查收。"
          attachments: paper_report_${{ steps.date_range.outputs.start_date }}_${{ steps.date_range.outputs.end_date }}.pdf

      - name: Commit and Push changes
        run: |
          set -e
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          GENERATED_DIR="$(mktemp -d)"
          cp -f *.json "$GENERATED_DIR"/

          git fetch origin main
          git checkout -f -B main origin/main

          cp -f "$GENERATED_DIR"/*.json .
          git add *.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update papers: $(date +'%Y-%m-%d')"
          git push origin main
