name: Weekly Paper Update

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日午夜运行 (UTC)
  workflow_dispatch: # 允许手动在 GitHub 界面点击运行

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests feedparser deep-translator fpdf scholarly

      - name: Run update script
        run: python update_papers.py

      - name: Fetch citations
        run: python update_citations.py

      - name: Generate report
        run: python generate_report.py

      - name: Get date range for filename
        id: date_range
        run: |
          START_DATE=$(date -d '7 days ago' +'%Y%m%d')
          END_DATE=$(date +'%Y%m%d')
          echo "start_date=$START_DATE" >> $GITHUB_OUTPUT
          echo "end_date=$END_DATE" >> $GITHUB_OUTPUT
          echo "display_date=$(date -d '7 days ago' +'%Y年%m月%d日')-$(date +'%Y年%m月%d日')" >> $GITHUB_OUTPUT

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.date_range.outputs.display_date }}，论文周报更新，请查收。"
          to: ${{ secrets.MAIL_TO }}
          from: "Seismology Bot"
          body: "${{ steps.date_range.outputs.display_date }}，论文周报更新，请查收。"
          attachments: paper_report_${{ steps.date_range.outputs.start_date }}_${{ steps.date_range.outputs.end_date }}.pdf

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          git commit -m "Auto-update papers: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main || echo "No remote changes to pull"
          git push
