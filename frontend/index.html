<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震学多专题论文周报</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .topic-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        .topic-btn {
            padding: 10px 20px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .topic-btn.active {
            background: #007bff;
            color: white;
        }
        .topic-btn:hover {
            background: #e7f1ff;
        }
        .topic-btn.active:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 地震学多专题论文周报</h1>
            <p>自动追踪、翻译并汇总最新地震学研究成果</p>
        </header>

        <nav class="topic-nav">
            <button class="topic-btn active" onclick="switchTopic('cryo')">🧊 冰川地震</button>
            <button class="topic-btn" onclick="switchTopic('das')">📡 DAS 论文</button>
            <button class="topic-btn" onclick="switchTopic('surface')">🌊 面波论文</button>
            <button class="topic-btn" onclick="switchTopic('imaging')">🔍 地震成像</button>
            <button class="topic-btn" onclick="switchTopic('earthquake')">🏠 地震研究</button>
        </nav>

        <div class="search-section text-center">
            <p style="color: #666; font-size: 0.9rem;">🔄 每周日自动更新 | 当前查看: <span id="current-topic-name">冰川地震论文</span> | 最后更新: <span id="last-update">-</span></p>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>正在加载数据...</p>
        </div>

        <div id="papers-list" class="papers-list"></div>

        <div id="paper-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title"></h2>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
